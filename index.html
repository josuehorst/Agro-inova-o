<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro Forte e Futuro Melhor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        :root {
            --font-size-base: 16px;
        }
        
        body {
            font-size: var(--font-size-base);
            transition: font-size 0.3s ease;
        }

        /* Modo Escuro */
        .dark body {
            background-color: #111827;
            color: #e5e7eb;
        }
        .dark .bg-white { background-color: #1f2937; }
        .dark .bg-blue-50 { background-color: #1e2937; }
        .dark .bg-gray-50 { background-color: #374151; }
        .dark .text-gray-800 { color: #e5e7eb; }
        .dark .text-gray-600 { color: #9ca3af; }
        .dark .text-gray-500 { color: #9ca3af; }
        .dark .bg-gray-900 { background-color: #111827; }

        a:focus, button:focus {
            outline: 3px solid #2563eb;
            outline-offset: 4px;
        }
        
        h1 { font-size: 2.5rem; }
        @media (min-width: 640px) { h1 { font-size: 3rem; } }
        h2 { font-size: 2rem; }
        h3 { font-size: 1.25rem; }
    </style>
</head>
<body class="bg-white text-gray-800 font-sans leading-relaxed transition-colors duration-300">

    <!-- Skip to main content -->
    <a href="#inicio" class="sr-only focus:not-sr-only fixed top-4 left-4 bg-blue-600 text-white px-4 py-2 rounded-lg z-[100]">
        Pular para o conteúdo principal
    </a>

    <!-- Cabeçalho -->
    <header class="bg-white shadow-sm sticky top-0 z-50 dark:bg-gray-900">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <span class="text-2xl" aria-hidden="true">🍵</span>
                <span class="font-bold text-xl text-blue-700 tracking-tight dark:text-blue-400">AgroFuturo</span>
            </div>

            <!-- Menu Desktop -->
            <nav class="hidden md:flex space-x-8 font-medium text-gray-600 dark:text-gray-300" aria-label="Navegação principal">
                <a href="#inicio" class="hover:text-blue-600 dark:hover:text-blue-400 transition">Início</a>
                <a href="#especies" class="hover:text-blue-600 dark:hover:text-blue-400 transition">Espécies de Chá</a>
                <a href="#frases" class="hover:text-blue-600 dark:hover:text-blue-400 transition">Filosofia</a>
            </nav>

            <div class="flex items-center gap-3">
                <!-- Controles de Zoom -->
                <div class="flex items-center bg-gray-100 dark:bg-gray-800 rounded-lg p-1">
                    <button id="zoom-out" 
                            class="w-8 h-8 flex items-center justify-center hover:bg-gray-200 dark:hover:bg-gray-700 rounded-md transition"
                            aria-label="Diminuir tamanho da fonte">
                        <span class="text-lg font-bold">-</span>
                    </button>
                    <button id="zoom-reset" 
                            class="w-8 h-8 flex items-center justify-center text-xs font-medium hover:bg-gray-200 dark:hover:bg-gray-700 rounded-md transition"
                            aria-label="Restaurar tamanho padrão">
                        100%
                    </button>
                    <button id="zoom-in" 
                            class="w-8 h-8 flex items-center justify-center hover:bg-gray-200 dark:hover:bg-gray-700 rounded-md transition"
                            aria-label="Aumentar tamanho da fonte">
                        <span class="text-lg font-bold">+</span>
                    </button>
                </div>

                <!-- Modo Escuro -->
                <button id="theme-toggle" 
                        class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition focus:outline-none focus:ring-2 focus:ring-blue-500"
                        aria-label="Alternar modo escuro">
                    <i class="fas fa-moon text-xl dark:hidden"></i>
                    <i class="fas fa-sun text-xl hidden dark:block"></i>
                </button>

                <!-- Menu Mobile -->
                <button id="mobile-menu-button"
                        class="md:hidden p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition focus:outline-none focus:ring-2 focus:ring-blue-500"
                        aria-label="Abrir menu" aria-expanded="false">
                    <i class="fas fa-bars text-2xl"></i>
                </button>
            </div>
        </div>

        <!-- Menu Mobile -->
        <div id="mobile-menu" class="hidden md:hidden bg-white dark:bg-gray-900 border-t dark:border-gray-700">
            <div class="px-4 py-6 space-y-4 font-medium text-gray-600 dark:text-gray-300">
                <a href="#inicio" class="block py-2 hover:text-blue-600 dark:hover:text-blue-400">Início</a>
                <a href="#especies" class="block py-2 hover:text-blue-600 dark:hover:text-blue-400">Espécies de Chá</a>
                <a href="#frases" class="block py-2 hover:text-blue-600 dark:hover:text-blue-400">Filosofia</a>
            </div>
        </div>
    </header>

    <!-- O resto do conteúdo permanece igual (seções de início, espécies, filosofia, rodapé) -->
    <!-- ... (copie o restante do código anterior aqui) ... -->

    <!-- Script atualizado -->
    <script>
        // === Dark Mode ===
        const toggle = document.getElementById('theme-toggle');
        const html = document.documentElement;

        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            html.classList.add('dark');
        }

        toggle.addEventListener('click', () => {
            html.classList.toggle('dark');
            localStorage.theme = html.classList.contains('dark') ? 'dark' : 'light';
        });

        // === Zoom Controls ===
        let currentZoom = 100;
        const body = document.body;
        const zoomOutBtn = document.getElementById('zoom-out');
        const zoomInBtn = document.getElementById('zoom-in');
        const zoomResetBtn = document.getElementById('zoom-reset');

        function updateZoom() {
            body.style.fontSize = currentZoom + '%';
            zoomResetBtn.textContent = currentZoom + '%';
        }

        zoomInBtn.addEventListener('click', () => {
            if (currentZoom < 150) {
                currentZoom += 10;
                updateZoom();
            }
        });

        zoomOutBtn.addEventListener('click', () => {
            if (currentZoom > 70) {
                currentZoom -= 10;
                updateZoom();
            }
        });

        zoomResetBtn.addEventListener('click', () => {
            currentZoom = 100;
            updateZoom();
        });

        // === Menu Mobile ===
        const mobileBtn = document.getElementById('mobile-menu-button');
        const mobileMenu = document.getElementById('mobile-menu');

        mobileBtn.addEventListener('click', () => {
            const isOpen = !mobileMenu.classList.contains('hidden');
            mobileMenu.classList.toggle('hidden');
            mobileBtn.setAttribute('aria-expanded', !isOpen);
            
            const icon = mobileBtn.querySelector('i');
            if (icon.classList.contains('fa-bars')) {
                icon.classList.remove('fa-bars');
                icon.classList.add('fa-xmark');
            } else {
                icon.classList.add('fa-bars');
                icon.classList.remove('fa-xmark');
            }
        });
    </script>
</body>
</html>
